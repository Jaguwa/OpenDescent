name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (typecheck + compile)
        run: npm run build

      # The integration/multi-peer tests spin up real libp2p nodes and rely on
      # local discovery, which can be flaky on shared CI runners. They run here
      # for visibility but don't gate the build yet; build is the hard gate.
      - name: Tests (integration + multi-peer)
        run: npm run test:all
        timeout-minutes: 10
        continue-on-error: true
